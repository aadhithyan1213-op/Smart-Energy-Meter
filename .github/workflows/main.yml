name: ⚡ Smart Energy Meter — CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:          # allow manual trigger from GitHub UI

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION_DEFAULT: "3.11"
  ARTIFACT_RETENTION_DAYS: 14

# ══════════════════════════════════════════════════════════════════════════════
jobs:

# ────────────────────────────────────────────────────────────────────────────
# JOB 1 · Lint & Static Analysis
# ────────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install flake8 black isort mypy bandit

      - name: Black — code formatting check
        run: black --check --diff src/ tests/

      - name: isort — import order check
        run: isort --check-only --diff src/ tests/

      - name: Flake8 — style & syntax
        run: |
          flake8 src/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --statistics

      - name: MyPy — type checking
        run: mypy src/ --ignore-missing-imports --strict

      - name: Bandit — security linting
        run: bandit -r src/ -ll -ii

# ────────────────────────────────────────────────────────────────────────────
# JOB 2 · Test Matrix (Python 3.9 / 3.10 / 3.11 / 3.12)
# ────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-report=html:htmlcov-${{ matrix.python-version }} \
            --cov-fail-under=80 \
            --junitxml=test-results-${{ matrix.python-version }}.xml \
            -v \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage-${{ matrix.python-version }}.xml
            htmlcov-${{ matrix.python-version }}/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()           # upload even on test failure
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Publish test results (summary)
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results-${{ matrix.python-version }}.xml
          check_name: "Test Results — Python ${{ matrix.python-version }}"

# ────────────────────────────────────────────────────────────────────────────
# JOB 3 · Build Distribution Package
# ────────────────────────────────────────────────────────────────────────────
  build:
    name: 📦 Build Package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # needed for version tagging

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel & sdist
        run: python -m build

      - name: Verify distribution
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

# ────────────────────────────────────────────────────────────────────────────
# JOB 4 · Docker Build & Push (main branch only)
# ────────────────────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/smart-energy-meter
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Docker image digest as artifact
        run: echo "${{ steps.meta.outputs.tags }}" > docker-tags.txt

      - name: Upload docker tags artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-tags
          path: docker-tags.txt
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

# ────────────────────────────────────────────────────────────────────────────
# JOB 5 · Deploy to Staging (main branch only)
# ────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.smartenergymeter.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: Deploy to staging server
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST:    ${{ secrets.STAGING_HOST }}
          STAGING_USER:    ${{ secrets.STAGING_USER }}
        run: |
          echo "🚀 Deploying Smart Energy Meter to staging..."
          # Example: rsync or kubectl apply
          # rsync -avz dist/ $STAGING_USER@$STAGING_HOST:/srv/smart-energy-meter/
          echo "✅ Staging deployment complete."

      - name: Run smoke tests on staging
        run: |
          echo "🔥 Running smoke tests..."
          # curl -f https://staging.smartenergymeter.io/api/health
          echo "✅ Smoke tests passed."

# ────────────────────────────────────────────────────────────────────────────
# JOB 6 · Security Scan (runs in parallel with lint)
# ────────────────────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install safety & pip-audit
        run: pip install safety pip-audit

      - name: pip-audit — dependency vulnerability scan
        run: pip-audit -r requirements.txt --format json -o pip-audit-report.json || true

      - name: Safety — known CVE check
        run: safety check -r requirements.txt --full-report || true

      - name: Upload security scan report
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: pip-audit-report.json
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

# ────────────────────────────────────────────────────────────────────────────
# JOB 7 · Notify on completion
# ────────────────────────────────────────────────────────────────────────────
  notify:
    name: 📣 Notify
    runs-on: ubuntu-latest
    needs: [lint, test, build, security]
    if: always()

    steps:
      - name: Pipeline summary
        run: |
          echo "## ⚡ Smart Energy Meter CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint        | ${{ needs.lint.result }} |"     >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Test        | ${{ needs.test.result }} |"     >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Build       | ${{ needs.build.result }} |"    >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security    | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
